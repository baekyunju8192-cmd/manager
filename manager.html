<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222536; --surface3:#2a2e42;
  --border:#2e3247; --text:#e8eaf0; --muted:#7b82a0;
  --red:#e84444; --green:#27ae60; --orange:#e67e22;
  --blue:#3b82f6; --accent:#5c6ef8; --gold:#f5a623;
}
body {

  background:var(--bg); color:var(--text);
  height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}
::-webkit-scrollbar { width:5px; height:5px; }

/* ── 로그인 오버레이 ── */
#auth-overlay {
  position:fixed; inset:0; background:radial-gradient(circle at 30% 20%, #171a26 0%, #0f1117 60%);

.auth-logo { font-size:26px; font-weight:800; letter-spacing:-.5px; color:var(--text); margin-bottom:2px; }

.auth-sub { font-size:12px; color:var(--muted); margin-bottom:14px; }
#auth-overlay select, #auth-overlay input {
  width:240px; padding:11px 16px; background:var(--surface); border:1px solid var(--border);

}
#auth-overlay select:focus, #auth-overlay input:focus { border-color:var(--accent); }
#auth-overlay button {
  width:240px; padding:11px; background:var(--accent); border:none; border-radius:9px;
  color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .15s;
}
#auth-overlay button:hover { opacity:.85; }
#pw-error { color:var(--red); font-size:12px; display:none; }

/* ── 헤더 ── */
header {
  height:52px; background:var(--surface); border-bottom:1px solid var(--border);

.hdiv { width:1px; height:20px; background:var(--border); flex-shrink:0; }

nav.toptabs::-webkit-scrollbar { display:none; }
.ttab {

  font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.ttab:hover { background:var(--surface2); color:var(--text); }
.ttab.on { background:var(--surface2); color:var(--text); }
.ttab.on::after { content:''; }
.hright { display:flex; align-items:center; gap:10px; flex-shrink:0; font-size:12px; color:var(--muted); }
.region-tag {

.logout-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* ── 메인 레이아웃 ── */
.main { flex:1; overflow:hidden; position:relative; }
.page { display:none; height:100%; overflow-y:auto; padding:18px 22px 40px; }
.page.on { display:block; }
.page.map-page { padding:0; overflow:hidden; }

/* ── 카드 그리드 공통 ── */

.g5 { grid-template-columns:repeat(5,1fr); }

@media (max-width:1100px) { .g4,.g5{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);} }
@media (max-width:680px) { .g4,.g5,.g3,.g2{grid-template-columns:1fr;} }

.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px;
}
.card-title { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.4px; text-transform:uppercase; margin-bottom:10px; }

.stat-sub { font-size:11.5px; color:var(--muted); margin-top:4px; }

<script>
// =====================================================
// 설정
// =====================================================
const SS_ID = '1mIXExxFRuZmcy7VKEe_w63Yu1QOqT5r8qondm4k91-c';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxT4UAHFE0UVxNPkQlyBPSezMp_pw3dU6oqB-ivXO4uAYapR7wBQNeKED-XEIMVdNhL-w/exec';
const GID = {
  active: '0',
  new: '2043143991',
  dormant: '1615833992',
  plan: '1621770753',
  top5: '299724501',
  origin: '399280512'
};
const COMPANY = { lat:35.2162723, lng:126.8245735, name:'(주)에이젯시스템' };
const COLORS = { active:'#3b82f6', new:'#27ae60', dormant:'#888888', target:'#f5a623', route:'#5c6ef8' };

// 팀장 계정 / 지역별 사원 배정 — 추후 확정 시 값 교체 (비번 전부 임시 0308)
const MANAGERS = {
  '관리자':     { pw:'0308', region:'관리자' },
  '광주팀장':    { pw:'0308', region:'광주' },
  '전남동부팀장': { pw:'0308', region:'전남동부' },
  '전남서부팀장': { pw:'0308', region:'전남서부' },
  '전북팀장':    { pw:'0308', region:'전북' }
};
const REGION_STAFF = {
  // '관리자'는 지역별 배정과 무관하게 항상 전체 데이터를 봄 (isStaffInScope에서 특수 처리)
  '광주':     ['FIXME'],
  '전남동부':  ['FIXME'],
  '전남서부':  ['FIXME'],
  '전북':     ['FIXME']
};

// =====================================================
// 상태
// =====================================================
let CUR_MGR = null;      // 로그인한 팀장 ID
let CUR_REGION = null;   // 담당 지역
let CUR_STAFF = [];      // 담당 지역 소속 사원 목록 (필터링 기준)

let data = { active:[], new:[], dormant:[], plan:[], top5raw:[], origin:[] };
let loadFailed = { active:false, new:false, dormant:false, plan:false, top5:false, origin:false };
let prospects = [];

let mgrMap = null;        // 동선 지도 kakao.maps.Map 인스턴스
let mgrMarkers = [];
let mgrPolylines = [];
let curIW = null;
function clearIW() { if (curIW) { curIW.setMap(null); curIW = null; } }

// =====================================================
// 로그인
// =====================================================
(function initMgrSelect() {
  const sel = document.getElementById('mgr-select');
  Object.keys(MANAGERS).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
})();

function checkMgrLogin() {
  const id = document.getElementById('mgr-select').value;
  const pw = document.getElementById('mgr-pw').value;
  const err = document.getElementById('pw-error');

  if (!id) { err.style.display='block'; err.textContent='팀장을 선택해주세요.'; return; }
  const mgr = MANAGERS[id];
  if (!mgr || mgr.pw !== pw) { err.style.display='block'; err.textContent='비밀번호가 틀렸습니다.'; document.getElementById('mgr-pw').value=''; return; }

  err.style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'none';
  localStorage.setItem('az_mgr_auth', '1');
  localStorage.setItem('az_mgr_id', id);
  CUR_MGR = id;
  CUR_REGION = mgr.region;
  CUR_STAFF = REGION_STAFF[CUR_REGION] || [];
  document.getElementById('region-tag').textContent = CUR_REGION;
  document.getElementById('hstatus').textContent = `${id} 님 | 데이터 로딩 중...`;
  bootAfterLogin();
}

function mgrLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  localStorage.removeItem('az_mgr_auth');
  localStorage.removeItem('az_mgr_id');
  location.reload();
}

function trySessionRestore() {
  if (localStorage.getItem('az_mgr_auth') === '1') {
    const id = localStorage.getItem('az_mgr_id');
    const mgr = MANAGERS[id];
    if (mgr) {
      document.getElementById('auth-overlay').style.display = 'none';
      CUR_MGR = id;
      CUR_REGION = mgr.region;
      CUR_STAFF = REGION_STAFF[CUR_REGION] || [];
      document.getElementById('region-tag').textContent = CUR_REGION;
      bootAfterLogin();
      return;
    }
  }
}

// 담당 사원 필터: FIXME 미배정 상태면 전체 데이터 통과(필터 없음) — 배정 완료 후 자동으로 좁혀짐
function isStaffInScope(name) {
  if (!name) return false;
  if (!CUR_STAFF.length || CUR_STAFF.includes('FIXME')) return true;
  return CUR_STAFF.includes(String(name).trim());
}

// =====================================================
// CSV 유틸 (az_sales_map.html 재사용)
// =====================================================
async function fetchCsvWithRetry(url, maxRetry = 3) {
  let lastErr;
  for (let attempt = 1; attempt <= maxRetry; attempt++) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const txt = await res.text();
      if (!txt || !txt.trim()) throw new Error('empty response');
      const head = txt.trim().toLowerCase();
      if (head.startsWith('<!doctype') || head.startsWith('<html')) {
        throw new Error('시트 접근 권한 오류로 추정됨 (HTML 응답 수신) — 공유 설정 확인 필요');
      }
      return txt;
    } catch (e) {
      lastErr = e;
      if (attempt < maxRetry) await new Promise(r => setTimeout(r, attempt * 800));
    }
  }
  throw lastErr;
}

function parseCSVRaw(txt) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  const s = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQ) {
      if (ch === '"') { if (s[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur=''; }
      else if (ch === '\n') { row.push(cur); cur=''; rows.push(row); row=[]; }
      else cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

// requiredKey: 유효 데이터 판단 기준 컬럼명 (시트별로 다름)
function parseCSV(txt, requiredKey) {
  const rows = parseCSVRaw(txt);
  if (rows.length < 2) return [];
  const hdrs = rows[0].map(h => h.trim());
  return rows.slice(1)
    .filter(r => r.some(v => v.trim()))
    .map(vals => {
      const obj = {};
      hdrs.forEach((h,i) => { obj[h] = (vals[i]||'').trim(); });
      return obj;
    })
    .filter(r => requiredKey ? r[requiredKey] : true);
}

function csvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SS_ID}/export?format=csv&gid=${gid}`;
}

// 거래처명 정규화: 공백 제거 + (주)/㈜/주식회사 표기 통일 (매칭 정확도 개선용, 완전한 해결책은 아님)
function normName(s) {
  return String(s||'').trim()
    .replace(/\s+/g,'')
    .replace(/\(주\)|㈜|주식회사/g, '');
}

// 거래처명 → {담당자, 주소} 매핑 (기존+신규+휴면 통합, 품목현황 등에서 지역/담당자 매칭용)
function buildAccountLookup() {
  const map = new Map();
  [...data.active, ...data.new, ...data.dormant].forEach(r => {
    const key = normName(r['거래처명']);
    if (key && !map.has(key)) map.set(key, { 담당자: r['담당자']||'', 주소: r['주소']||'' });
  });
  return map;
}

// 주소 문자열에서 시/도 단위 지역명 추출 (광주/전남/전북 등)
function extractSido(addr) {
  if (!addr) return '기타';
  const s = String(addr).trim();
  if (s.startsWith('광주')) return '광주';
  if (s.startsWith('전남') || s.startsWith('전라남도')) return '전남';
  if (s.startsWith('전북') || s.startsWith('전라북도') || s.startsWith('전북특별자치도')) return '전북';
  return '기타';
}
function escHtml(s) { return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '새로고침 중...'; }
  document.getElementById('globalLoading').classList.remove('hide');
  try {

function setLoadTxt(t) { const el = document.getElementById('globalLoadTxt'); if (el) el.textContent = t; }

async function loadAllData() {
  const sheetJobs = [
    ['active','기존거래처','거래처명'],
    ['new','신규거래처','거래처명'],
    ['dormant','휴면거래처','거래처명'],
    ['plan','영업계획','사원명'],
    ['top5','거래처별주요품목','거래처명'],
    ['origin','원산지검토','업체명']
  ];
  for (const [key,label,reqKey] of sheetJobs) {
    setLoadTxt(`${label} 로딩 중...`);
    try {
      const txt = await fetchCsvWithRetry(csvUrl(GID[key]));
      const parsed = parseCSV(txt, reqKey);
      data[key === 'top5' ? 'top5raw' : key] = parsed;
      loadFailed[key] = false;
    } catch(e) {
      console.error(key, e);
      loadFailed[key] = true;
      if (key === 'plan') {
        // 영업계획: 실사용 전이라 데이터 없을 수 있음 — 실패로 취급하지 않고 조용히 빈 배열
        loadFailed.plan = false;
        data.plan = [];
      }
    }
  }

  setLoadTxt('신규영업처 로딩 중...');
  try {
    const res = await fetch(WEBAPP_URL + '?action=getProspects');
    const json = await res.json();
    prospects = (json.success && json.data) ? json.data : [];
  } catch(e) {
    console.error('prospects', e);
    prospects = [];
  }

  showLoadFailBanner();
}

  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처', top5:'주요품목', origin:'원산지검토' };

function parseDateLoose(s) {
  if (!s) return null;
  const t = String(s).trim();
  let m = t.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = t.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}
function daysSince(dateObj) {
  if (!dateObj) return null;
  return Math.floor((Date.now() - dateObj.getTime()) / 86400000);
}

// staffPeriod 기준으로 [from, to] Date 범위를 계산 (to는 당일 23:59:59 포함)
function getStaffDateRange() {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (staffPeriod.mode === 'today') {
    return [todayStart, new Date(todayStart.getTime()+86400000-1)];
  }
  if (staffPeriod.mode === '7d') {
    return [new Date(todayStart.getTime()-6*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  if (staffPeriod.mode === '30d') {
    return [new Date(todayStart.getTime()-29*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  // custom
  const from = staffPeriod.from ? parseDateLoose(staffPeriod.from) : null;
  const to = staffPeriod.to ? parseDateLoose(staffPeriod.to) : null;
  return [from, to ? new Date(to.getTime()+86400000-1) : null];
}

function renderStaffContent() {
  const holder = document.getElementById('staff-content');
  if (!holder) return;
  const [rangeFrom, rangeTo] = getStaffDateRange();

  const active = filterByScope(data.active);
  const newC = filterByScope(data.new);
  const dormant = filterByScope(data.dormant);
  const plan = filterByScope(data.plan).filter(r => {
    const d = parseDateLoose(r['날짜']);
    if (!d) return false;
    if (rangeFrom && d < rangeFrom) return false;
    if (rangeTo && d > rangeTo) return false;
    return true;
  });
  const myProspects = prospects.filter(p => isStaffInScope(p['등록자'])).filter(p => {
    const d = parseDateLoose(p['등록일']);
    if (!d) return false;
    if (rangeFrom && d < rangeFrom) return false;
    if (rangeTo && d > rangeTo) return false;
    return true;
  });

  const staffSet = new Set();
  [...filterByScope(data.active),...filterByScope(data.new),...filterByScope(data.dormant),...filterByScope(data.plan)]
    .forEach(r => { const n = r['담당자']||r['사원명']; if (n) staffSet.add(n); });
  prospects.filter(p => isStaffInScope(p['등록자'])).forEach(p => { if (p['등록자']) staffSet.add(p['등록자']); });
  const staffList = [...staffSet].sort();

  function countBy(rows, key) {
    const m = {}; rows.forEach(r => { const n = r[key]; if (n) m[n] = (m[n]||0)+1; }); return m;
  }
  const activeCnt = countBy(active, '담당자');
  const newCnt = countBy(newC, '담당자');
  const dormantCnt = countBy(dormant, '담당자');
  const prospectCnt = countBy(myProspects, '등록자');

  function planStats(name) {
    const rows = plan.filter(r => r['사원명'] === name);
    const done = rows.filter(r => String(r['방문완료']).trim().toLowerCase() === 'true').length;
    return { total: rows.length, done, rate: rows.length ? Math.round(done/rows.length*100) : null };
  }
  // 신규영업처 등록 건 대비 방문 처리(방문여부=true) 비율 — 기간 내 등록분 기준
  function prospectVisitStats(name) {
    const rows = myProspects.filter(p => p['등록자'] === name);
    const visited = rows.filter(p => String(p['방문여부']).trim().toLowerCase() === 'true').length;
    return { total: rows.length, visited, rate: rows.length ? Math.round(visited/rows.length*100) : null };
  }
  function resultDist(name) {
    const rows = myProspects.filter(p => p['등록자'] === name);
    const dist = { 성공:0, 보류:0, 실패:0, 관심:0, '':0 };

// 검색어(거래처명/담당자) + 현재 필터 적용된 목록 반환 (지도·테이블·CSV 공용)
function getAcctFilteredRows() {
  let rows = filterByScope(data[acctFilter]);
  if (acctSearchTerm) {
    const term = acctSearchTerm.toLowerCase();
    rows = rows.filter(r =>
      String(r['거래처명']||'').toLowerCase().includes(term) ||
      String(r['담당자']||'').toLowerCase().includes(term)
    );
  }
  return rows.map(r => ({ ...r, _days: daysSince(parseDateLoose(r['마지막거래일'])) }));
}

function renderAccountsTable() {
  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처' };
  document.getElementById('acct-list-title').textContent = labels[acctFilter] + ' 목록';
  const rows = getAcctFilteredRows();
  const holder = document.getElementById('acct-table-holder');
  if (!rows.length) { holder.innerHTML = `<div class="empty-hint">데이터가 없습니다.</div>`; return; }

  if (acctGroupByStaff) {
    holder.innerHTML = renderAcctGroupedByStaff(rows);
    return;
  }

  const sorted = acctFilter === 'dormant'
    ? [...rows].sort((a,b)=>(b._days||0)-(a._days||0))
    : rows;

  holder.innerHTML = `
    <div style="max-height:480px;overflow-y:auto">
    <table class="dt">
      <thead><tr><th>거래처명</th><th>담당자</th><th>마지막거래일</th><th>${acctFilter==='dormant'?'경과':'상태'}</th></tr></thead>
      <tbody>
        ${sorted.map(r => `<tr>
          <td>${escHtml(r['거래처명'])}</td>
          <td>${escHtml(r['담당자'])}</td>
          <td>${escHtml(r['마지막거래일'])}</td>
          <td>${renderAcctStatusBadge(r)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
  `;
}

// 기존거래처는 곧 휴면 위험(3개월+)을 배지로 미리 경고, 휴면거래처는 경과 구간 배지
function renderAcctStatusBadge(r) {
  if (r._days == null) return '-';
  if (acctFilter === 'dormant') {
    return `<span class="badge ${r._days>=180?'b-red':'b-orange'}">${classifyDormant(r._days)}</span>`;
  }
  if (acctFilter === 'active' && r._days >= 90) {
    return `<span class="badge b-orange">휴면위험 ${r._days}일</span>`;
  }
  return '';
}

function renderAcctGroupedByStaff(rows) {
  const groups = {};
  rows.forEach(r => {
    const name = r['담당자'] || '(미배정)';
    (groups[name] = groups[name] || []).push(r);
  });
  const names = Object.keys(groups).sort();
  return `<div style="max-height:520px;overflow-y:auto">` + names.map(name => `
    <details style="margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <summary style="padding:9px 12px;cursor:pointer;font-size:12.5px;font-weight:600;background:var(--surface2)">
        ${escHtml(name)} <span style="color:var(--muted);font-weight:400">(${groups[name].length}건)</span>
      </summary>
      <table class="dt" style="margin:0">
        <tbody>
          ${groups[name].map(r => `<tr>
            <td>${escHtml(r['거래처명'])}</td>
            <td>${escHtml(r['마지막거래일'])}</td>
            <td>${renderAcctStatusBadge(r)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </details>
  `).join('') + `</div>`;
}

function classifyDormant(days) {
  if (days >= 365) return '1년+';
  if (days >= 180) return '6개월~1년';
  if (days >= 90) return '3~6개월';
  return days + '일';
}

// 현재 필터/검색 기준 목록을 CSV로 내보냄 (엑셀에서 한글 깨짐 방지를 위해 BOM 포함)
function exportAcctCsv() {
  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처' };
  const rows = getAcctFilteredRows();
  if (!rows.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const headers = ['거래처명','담당자','주소','마지막거래일','경과일'];
  const csvRows = [headers.join(',')];
  rows.forEach(r => {
    const line = [r['거래처명'], r['담당자'], r['주소'], r['마지막거래일'], r._days!=null?r._days:'']
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',');
    csvRows.push(line);
  });
  const csvContent = '\uFEFF' + csvRows.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${labels[acctFilter]}_${CUR_REGION}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

let acctMapInst = null, acctMapMarkers = [];
function renderAccountsMap() {
  const el = document.getElementById('acctMap');
  if (!el) return;
  clearIW();
  if (!acctMapInst) {
    acctMapInst = new kakao.maps.Map(el, { center:new kakao.maps.LatLng(COMPANY.lat,COMPANY.lng), level:9 });
  } else {
    kakao.maps.event.trigger(acctMapInst, 'resize');
  }
  acctMapMarkers.forEach(m => m.setMap(null));
  acctMapMarkers = [];
  const rows = getAcctFilteredRows();
  const color = COLORS[acctFilter];
  const bounds = new kakao.maps.LatLngBounds();
  let any = false;
  rows.forEach(r => {
    const lat = parseFloat(r['위도']), lng = parseFloat(r['경도']);
    if (isNaN(lat) || isNaN(lng)) return;
    any = true;
    const pos = new kakao.maps.LatLng(lat,lng);
    bounds.extend(pos);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"><circle cx="7" cy="7" r="6" fill="${color}" stroke="white" stroke-width="1.5"/></svg>`;
    const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    const marker = new kakao.maps.Marker({ position:pos, map:acctMapInst, image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(14,14)) });
    kakao.maps.event.addListener(marker, 'click', () => {
      clearIW();
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.4,
        content:`<div class="iw"><div class="iw-name">${escHtml(r['거래처명'])}</div><div class="iw-addr">${escHtml(r['주소']||'')}</div><div class="iw-mgr">담당: ${escHtml(r['담당자']||'-')}</div></div>`
      });
      curIW.setMap(acctMapInst);
    });
    acctMapMarkers.push(marker);
  });
  if (any) acctMapInst.setBounds(bounds);
}

// 원산지검토 타겟 중 신규영업처(prospects)로 등록되고 방문 처리된 업체를 정확 매칭으로 찾아냄
// 표기 차이(㈜/(주) 등)는 normName으로 흡수하되, 완전히 다른 표기는 매칭되지 않을 수 있음
function buildVisitedTargetSet() {
  const visited = new Set();
  prospects.forEach(p => {
    if (String(p['방문여부']).trim().toLowerCase() === 'true') {
      visited.add(normName(p['업체명']));
    }
  });
  return visited;
}

function getFilteredTargets() {
  const existingNames = new Set([...data.active, ...data.new].map(r => normName(r['거래처명'])));
  let targets = data.origin.filter(r => {
    const use = String(r['수입육사용']||'').trim();
    return (use === 'O' || use === '') && !existingNames.has(normName(r['업체명']));
  });
  if (targetFilterCat) {
    targets = targets.filter(t => (t['카테고리']||'') === targetFilterCat);
  }
  if (targetFilterKw) {
    // 영업품목 컬럼에 키워드가 수기 입력되어 있어야 매칭됨
    targets = targets.filter(t => String(t['영업품목']||'').includes(targetFilterKw));
  }
  return targets;
}

function renderTargetsContent() {
  const targets = getFilteredTargets();
  const visitedSet = buildVisitedTargetSet();
  const catCnt = {};
  targets.forEach(t => { const c = t['카테고리']||'기타'; catCnt[c] = (catCnt[c]||0)+1; });

  const summaryHolder = document.getElementById('target-summary-cards');
  if (summaryHolder) {
    summaryHolder.innerHTML = `
      <div class="card">
        <div class="card-title">${targetFilterCat || targetFilterKw ? '필터 결과' : '미개척 타겟'}</div>
        <div class="stat-num gold">${targets.length}</div>
        <div class="stat-sub">${targetFilterKw ? targetFilterKw : targetFilterCat ? targetFilterCat : '수입육 사용 의심 · 미거래'}</div>
      </div>
      ${Object.entries(catCnt).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n]) => `
        <div class="card">
          <div class="card-title">${escHtml(c)}</div>
          <div class="stat-num">${n}</div>
          <div class="stat-sub">타겟 업체 수</div>
        </div>
      `).join('')}
    `;
  }

  const tableHolder = document.getElementById('target-table-holder');
  if (tableHolder) {
    tableHolder.innerHTML = targets.length ? `
      <table class="dt">
        <thead><tr><th>업체명</th><th>카테고리</th><th>수입육사용</th><th>발견일</th><th>방문</th></tr></thead>
        <tbody>
          ${targets.map(t => `<tr>
            <td>${escHtml(t['업체명'])}</td>
            <td>${escHtml(t['카테고리']||'-')}</td>
            <td><span class="badge ${t['수입육사용']==='O'?'b-red':'b-gray'}">${escHtml(t['수입육사용']||'미확인')}</span></td>
            <td>${escHtml(t['발견일']||'-')}</td>
            <td>${visitedSet.has(normName(t['업체명'])) ? '🚩' : ''}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : `<div class="empty-hint">해당 조건의 미개척 타겟이 없습니다.</div>`;
  }

  renderTargetsMap(targets, visitedSet);
}

function renderTargetsMap(targets, visitedSet) {
  if (!targetMapInst) return;
  clearIW();
  if (window._targetMapMarkers) window._targetMapMarkers.forEach(m => m.setMap(null));
  window._targetMapMarkers = [];

  const bounds = new kakao.maps.LatLngBounds();
  let any = false;
  targets.forEach(t => {
    const lat = parseFloat(t['위도']), lng = parseFloat(t['경도']);
    if (isNaN(lat) || isNaN(lng)) return;
    any = true;
    const pos = new kakao.maps.LatLng(lat,lng);
    bounds.extend(pos);
    const isVisited = visitedSet.has(normName(t['업체명']));
    // 방문완료: 깃발 이모지 마커 / 미방문: 기존 점 마커
    let markerImg;
    if (isVisited) {
      const flagSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="26"><text x="11" y="20" font-size="20" text-anchor="middle">🚩</text></svg>`;
      const flagUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(flagSvg)));
      markerImg = new kakao.maps.MarkerImage(flagUrl, new kakao.maps.Size(22,26), { offset:new kakao.maps.Point(11,24) });
    } else {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"><circle cx="7" cy="7" r="6" fill="${COLORS.target}" stroke="white" stroke-width="1.5"/></svg>`;
      const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      markerImg = new kakao.maps.MarkerImage(url, new kakao.maps.Size(14,14));
    }
    const marker = new kakao.maps.Marker({ position:pos, map:targetMapInst, image:markerImg });
    kakao.maps.event.addListener(marker, 'click', () => {
      clearIW();
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.4,
        content:`<div class="iw"><div class="iw-name">${isVisited?'🚩 ':''}${escHtml(t['업체명'])}</div><div class="iw-addr">${escHtml(t['카테고리']||'')}</div></div>`
      });
      curIW.setMap(targetMapInst);
    });
    window._targetMapMarkers.push(marker);
  });
  if (any) targetMapInst.setBounds(bounds);
}

// =====================================================
// 품목 현황 탭
// =====================================================
function renderItemsPage() {
  const page = document.getElementById('page-items');
  const staffSet = new Set();
  [...data.active, ...data.new, ...data.dormant].forEach(r => { if (r['담당자']) staffSet.add(r['담당자']); });

  page.innerHTML = `
    <div class="filterbar">
      <select id="items-filter-type" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12.5px">
        <option value="all">전체</option>
        <option value="region">지역별</option>
        <option value="staff">사원별</option>
      </select>
      <select id="items-filter-value" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12.5px;display:none"></select>
    </div>
    <div class="section-title">품목별 총 취급량 (KG)</div>
    <div class="card" id="items-total-card"></div>

    <div class="section-title">거래처별 상위 품목</div>
    <div class="card" id="items-detail-card"></div>

    <div class="section-title" id="items-unmatched-title" style="display:none">거래처명 매칭 실패 (담당자/지역 필터 시 제외됨)</div>
    <div class="card" id="items-unmatched-card" style="display:none"></div>
  `;

  const typeSel = document.getElementById('items-filter-type');
  const valSel = document.getElementById('items-filter-value');
  typeSel.addEventListener('change', () => {
    const type = typeSel.value;
    if (type === 'all') {
      valSel.style.display = 'none'; valSel.innerHTML = '';
    } else if (type === 'region') {
      valSel.style.display = '';
      valSel.innerHTML = ['광주','전남','전북'].map(r => `<option value="${r}">${r}</option>`).join('');
    } else if (type === 'staff') {
      valSel.style.display = '';
      valSel.innerHTML = [...staffSet].sort().map(s => `<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('');
    }
    renderItemsContent();
  });
  valSel.addEventListener('change', renderItemsContent);

  renderItemsContent();
}

function renderItemsContent() {
  const type = document.getElementById('items-filter-type')?.value || 'all';
  const val = document.getElementById('items-filter-value')?.value || '';
  const lookup = buildAccountLookup();

  const matched = [];
  const unmatched = [];
  data.top5raw.forEach(r => {
    const info = lookup.get(normName(r['거래처명']));
    if (type === 'all') { matched.push(r); return; }
    if (!info) { unmatched.push(r); return; } // 정확 매칭 실패 — 필터 적용 시 집계에서 제외, 별도 목록에 노출
    if (type === 'region' && extractSido(info.주소) === val) matched.push(r);
    else if (type === 'staff' && info.담당자 === val) matched.push(r);
  });

  const itemTotals = {};
  matched.forEach(r => {
    for (let i=1;i<=5;i++) {
      const nm = r[`TOP${i}_품목`], kg = parseFloat(r[`TOP${i}_KG`]);
      if (!nm || isNaN(kg)) continue;
      itemTotals[nm] = (itemTotals[nm]||0) + kg;
    }
  });
  const sortedItems = Object.entries(itemTotals).sort((a,b)=>b[1]-a[1]);
  const max = sortedItems.length ? sortedItems[0][1] : 1;

  document.getElementById('items-total-card').innerHTML = sortedItems.length ? sortedItems.map(([nm,kg]) => `
    <div class="barrow">
      <div class="blabel">${escHtml(nm)}</div>
      <div class="btrack"><div class="bfill" style="width:${Math.max(4,kg/max*100)}%"></div></div>
      <div class="bval">${kg.toLocaleString()}kg</div>
    </div>
  `).join('') : `<div class="empty-hint">해당 조건에 품목 데이터가 없습니다.</div>`;

  document.getElementById('items-detail-card').innerHTML = matched.length ? `
    <table class="dt">
      <thead><tr><th>거래처명</th><th>1위</th><th>2위</th><th>3위</th></tr></thead>
      <tbody>
        ${matched.map(r => `<tr>
          <td>${escHtml(r['거래처명'])}</td>
          <td>${escHtml(r['TOP1_품목']||'-')} ${r['TOP1_KG']?`<span style="color:var(--muted)">(${r['TOP1_KG']}kg)</span>`:''}</td>
          <td>${escHtml(r['TOP2_품목']||'-')} ${r['TOP2_KG']?`<span style="color:var(--muted)">(${r['TOP2_KG']}kg)</span>`:''}</td>
          <td>${escHtml(r['TOP3_품목']||'-')} ${r['TOP3_KG']?`<span style="color:var(--muted)">(${r['TOP3_KG']}kg)</span>`:''}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="empty-hint">데이터가 없습니다.</div>`;

  const unmatchedTitle = document.getElementById('items-unmatched-title');
  const unmatchedCard = document.getElementById('items-unmatched-card');
  if (type !== 'all' && unmatched.length) {
    unmatchedTitle.style.display = '';
    unmatchedCard.style.display = '';
    unmatchedCard.innerHTML = `
      <div class="stat-sub" style="margin-bottom:8px">아래 거래처는 거래처명 표기 차이 등으로 담당자/지역을 자동 매칭하지 못해 위 통계에서 제외되었습니다.</div>
      <table class="dt">
        <thead><tr><th>거래처명</th></tr></thead>
        <tbody>${unmatched.map(r => `<tr><td>${escHtml(r['거래처명'])}</td></tr>`).join('')}</tbody>
      </table>
    `;
  } else {
    unmatchedTitle.style.display = 'none';
    unmatchedCard.style.display = 'none';
  }
}

// =====================================================
// 동선 지도 탭
// =====================================================
function initRoutePage() {
  const page = document.getElementById('page-route');
  const staffSet = new Set();
  filterByScope(data.plan).forEach(r => { if (r['사원명']) staffSet.add(r['사원명']); });
  const staffList = [...staffSet].sort();

  page.innerHTML = `
    <div class="map-shell">
      <div class="map-side">
        <div class="map-side-sec">
          <div class="map-side-label">사원 선택</div>
          <select id="route-staff-sel" style="width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12.5px">
            <option value="">전체</option>
            ${staffList.map(s => `<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}
          </select>
        </div>
        <div class="map-side-sec">
          <div class="map-side-label">범례</div>
          <div class="legend-row"><span class="dot" style="background:${COLORS.route}"></span>동선 순서</div>
          <div class="legend-row"><span class="dot" style="background:var(--green)"></span>방문완료</div>
          <div class="legend-row"><span class="dot" style="background:${COLORS.active}"></span>미방문</div>
        </div>
        <div class="map-side-label" style="padding:10px 14px 0">방문 목록</div>
        <div class="route-list" id="route-list"></div>
      </div>
      <div class="map-wrap">
        <button class="map-toggle-btn" onclick="document.querySelector('#page-route .map-side').classList.toggle('open')">☰</button>
        <div id="mgrMap"></div>
      </div>
    </div>
  `;

  mgrMap = new kakao.maps.Map(document.getElementById('mgrMap'), {
    center:new kakao.maps.LatLng(COMPANY.lat,COMPANY.lng), level:9
  });

  document.getElementById('route-staff-sel').onchange = renderRoute;
  renderRoute();
}

function renderRoute() {
  const staffSel = document.getElementById('route-staff-sel').value;
  let rows = filterByScope(data.plan);
  if (staffSel) rows = rows.filter(r => r['사원명'] === staffSel);
  rows = rows.filter(r => !isNaN(parseFloat(r['위도'])) && !isNaN(parseFloat(r['경도'])));
  rows.sort((a,b) => (parseInt(a['No'])||0) - (parseInt(b['No'])||0));

  clearIW();
  mgrMarkers.forEach(m => m.setMap(null)); mgrMarkers = [];
  mgrPolylines.forEach(p => p.setMap(null)); mgrPolylines = [];

  const list = document.getElementById('route-list');
  if (!rows.length) {
    list.innerHTML = `<div class="empty-hint">오늘 등록된 영업계획이 없습니다.<br>(영업계획 시트는 실사용 전으로, 아직 데이터가 없을 수 있습니다.)</div>`;
    return;
  }

  const path = [];
  const bounds = new kakao.maps.LatLngBounds();
  list.innerHTML = rows.map((r,i) => {
    const lat = parseFloat(r['위도']), lng = parseFloat(r['경도']);
    const pos = new kakao.maps.LatLng(lat,lng);
    path.push(pos);
    bounds.extend(pos);
    const visited = String(r['방문완료']).trim().toLowerCase() === 'true';
    const color = visited ? '#27ae60' : COLORS.active;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="10" fill="${color}" stroke="white" stroke-width="2"/><text x="11" y="15" font-size="10" fill="white" text-anchor="middle" font-family="sans-serif">${i+1}</text></svg>`;
    const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    const marker = new kakao.maps.Marker({ position:pos, map:mgrMap, image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(22,22)) });
    kakao.maps.event.addListener(marker, 'click', () => {
      mgrMap.panTo(pos);
      if (curIW) curIW.setMap(null);
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.6,
        content:`<div class="iw"><div class="iw-name">${escHtml(r['거래처명'])}</div><div class="iw-addr">${escHtml(r['주소']||'')}</div><div class="iw-mgr">${visited?'방문완료':'미방문'} · ${escHtml(r['사원명'])}</div></div>`
      });
      curIW.setMap(mgrMap);
    });
    mgrMarkers.push(marker);
    return `<div class="route-item" data-idx="${i}">
      <div class="ri-name">${i+1}. ${escHtml(r['거래처명'])} ${visited?'<span class="badge b-green">완료</span>':''}</div>
      <div class="ri-meta">${escHtml(r['사원명'])} · ${escHtml(r['날짜']||'')}</div>
    </div>`;
  }).join('');

  const polyline = new kakao.maps.Polyline({ path, strokeWeight:3, strokeColor:COLORS.route, strokeOpacity:.8, strokeStyle:'solid' });
  polyline.setMap(mgrMap);
  mgrPolylines.push(polyline);
  mgrMap.setBounds(bounds);

  list.querySelectorAll('.route-item').forEach(el => {
    el.onclick = () => {
      const idx = +el.dataset.idx;
      mgrMap.panTo(path[idx]);
    };
  });
}

// =====================================================
// 탭 전환
// =====================================================
document.getElementById('toptabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.ttab');
  if (!btn) return;
  document.querySelectorAll('.ttab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-' + btn.dataset.page).classList.add('on');

  const key = btn.dataset.page;
  if (!renderedTabs.has(key)) {
    // 최초 진입: 데이터가 이미 로드된 상태라면 여기서 렌더 (지도 컨테이너가 보이는 상태에서 생성됨)
    if (CUR_MGR) renderTab(key);
  } else {
    // 재방문: 지도가 있는 탭은 resize만 트리거 (컨테이너 크기가 display:none 동안 0으로 잡혔을 수 있음)
    if (key === 'route' && mgrMap) kakao.maps.event.trigger(mgrMap, 'resize');
    if (key === 'accounts' && acctMapInst) {
      // goToAccountsFiltered 등에서 acctFilter가 바뀌었을 수 있으므로 필터 상태 반영해 다시 그림
      updateAcctFilterButtons();
      renderAccountsTable();
      kakao.maps.event.trigger(acctMapInst, 'resize');
      renderAccountsMap();
    }
  }
});

// =====================================================
// 초기화
// =====================================================
window.addEventListener('load', trySessionRestore);
</script>
