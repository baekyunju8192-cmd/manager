<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AZ 팀장 대시보드</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ec7bc6e64af739bb295e74161a8a069d&libraries=services"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222536; --surface3:#2a2e42;
  --border:#2e3247; --text:#e8eaf0; --muted:#7b82a0;
  --red:#e84444; --green:#27ae60; --orange:#e67e22;
  --blue:#3b82f6; --accent:#5c6ef8; --gold:#f5a623;
}
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── 로그인 오버레이 ── */
#auth-overlay {
  position:fixed; inset:0; background:radial-gradient(circle at 30% 20%, #171a26 0%, #0f1117 60%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; gap:12px;
}
.auth-logo { font-size:26px; font-weight:800; letter-spacing:-.5px; color:var(--text); margin-bottom:2px; }
.auth-logo span { color:var(--accent); }
.auth-sub { font-size:12px; color:var(--muted); margin-bottom:14px; }
#auth-overlay select, #auth-overlay input {
  width:240px; padding:11px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:9px; color:var(--text); font-size:14px; outline:none; text-align:center;
}
#auth-overlay select:focus, #auth-overlay input:focus { border-color:var(--accent); }
#auth-overlay button {
  width:240px; padding:11px; background:var(--accent); border:none; border-radius:9px;
  color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .15s;
}
#auth-overlay button:hover { opacity:.85; }
#pw-error { color:var(--red); font-size:12px; display:none; }

/* ── 헤더 ── */
header {
  height:52px; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; gap:14px; flex-shrink:0;
}
.logo { font-size:15px; font-weight:800; letter-spacing:-.3px; flex-shrink:0; }
.logo span { color:var(--accent); }
.hdiv { width:1px; height:20px; background:var(--border); flex-shrink:0; }
nav.toptabs { display:flex; gap:2px; overflow-x:auto; flex:1; }
nav.toptabs::-webkit-scrollbar { display:none; }
.ttab {
  padding:8px 14px; background:none; border:none; border-radius:7px; color:var(--muted);
  font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.ttab:hover { background:var(--surface2); color:var(--text); }
.ttab.on { background:var(--surface2); color:var(--text); }
.ttab.on::after { content:''; }
.hright { display:flex; align-items:center; gap:10px; flex-shrink:0; font-size:12px; color:var(--muted); }
.region-tag {
  padding:4px 10px; background:var(--surface3); border-radius:20px; color:var(--text); font-weight:600; font-size:11.5px;
}
.logout-btn { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 10px; font-size:11px; cursor:pointer; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* ── 메인 레이아웃 ── */
.main { flex:1; overflow:hidden; position:relative; }
.page { display:none; height:100%; overflow-y:auto; padding:18px 22px 40px; }
.page.on { display:block; }
.page.map-page { padding:0; overflow:hidden; }

/* ── 카드 그리드 공통 ── */
.grid { display:grid; gap:14px; }
.g4 { grid-template-columns:repeat(4,1fr); }
.g5 { grid-template-columns:repeat(5,1fr); }
.g3 { grid-template-columns:repeat(3,1fr); }
.g2 { grid-template-columns:repeat(2,1fr); }
@media (max-width:1100px) { .g4,.g5{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);} }
@media (max-width:680px) { .g4,.g5,.g3,.g2{grid-template-columns:1fr;} }

.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px;
}
.card-title { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.4px; text-transform:uppercase; margin-bottom:10px; }
.stat-num { font-size:28px; font-weight:800; letter-spacing:-.5px; }
.stat-sub { font-size:11.5px; color:var(--muted); margin-top:4px; }
.stat-num.blue{color:var(--blue)} .stat-num.green{color:var(--green)} .stat-num.orange{color:var(--orange)} .stat-num.red{color:var(--red)} .stat-num.gold{color:var(--gold)}

.section-title { font-size:16px; font-weight:800; margin:22px 0 12px; letter-spacing:-.3px; }
.section-title:first-child { margin-top:0; }

/* 필터바 */
.filterbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.filterbar select, .filterbar input[type=date] {
  background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:7px 10px;
  color:var(--text); font-size:12.5px; outline:none;
}
.chip-btn {
  padding:6px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:20px;
  color:var(--muted); font-size:12px; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.chip-btn:hover { border-color:var(--accent); color:var(--text); }
.chip-btn.on { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

/* 테이블 */
table.dt { width:100%; border-collapse:collapse; font-size:12.5px; }
table.dt th { text-align:left; padding:9px 10px; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.3px; border-bottom:1px solid var(--border); }
table.dt td { padding:9px 10px; border-bottom:1px solid var(--border); }
table.dt tr:hover td { background:var(--surface2); }
table.dt tr:last-child td { border-bottom:none; }
.badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:700; }
.b-blue{background:rgba(59,130,246,.15);color:var(--blue)} .b-green{background:rgba(39,174,96,.15);color:var(--green)}
.b-red{background:rgba(232,68,68,.15);color:var(--red)} .b-orange{background:rgba(230,126,34,.15);color:var(--orange)}
.b-gray{background:rgba(123,130,160,.15);color:var(--muted)} .b-gold{background:rgba(245,166,35,.15);color:var(--gold)}

.empty-hint { padding:30px 10px; text-align:center; color:var(--muted); font-size:12.5px; }
.loading-overlay {
  position:absolute; inset:0; background:rgba(15,17,23,.9); display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:50; gap:10px;
}
.loading-overlay.hide { display:none; }
.spin { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
.load-txt { font-size:12px; color:var(--muted); }

/* 바 차트 (순수 CSS) */
.barrow { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.barrow .blabel { width:110px; font-size:12px; color:var(--text); flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.barrow .btrack { flex:1; height:16px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.barrow .bfill { height:100%; background:linear-gradient(90deg,var(--accent),var(--blue)); border-radius:4px; }
.barrow .bval { width:64px; text-align:right; font-size:11.5px; color:var(--muted); flex-shrink:0; }

/* 지도 페이지 */
.map-shell { display:flex; height:100%; }
.map-side { width:280px; background:var(--surface); border-right:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; overflow:hidden; }
.map-side-sec { padding:12px 14px; border-bottom:1px solid var(--border); }
.map-side-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.map-wrap { flex:1; position:relative; }
#mgrMap { width:100%; height:100%; }
.route-list { flex:1; overflow-y:auto; padding:6px 0; }
.route-item { padding:8px 14px; border-bottom:1px solid var(--border); font-size:12px; cursor:pointer; }
.route-item:hover { background:var(--surface2); }
.route-item .ri-name { font-weight:600; }
.route-item .ri-meta { color:var(--muted); font-size:10.5px; margin-top:2px; }

.iw { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; min-width:170px; max-width:230px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.iw-name { font-size:13px; font-weight:700; margin-bottom:3px; }
.iw-addr { font-size:10px; color:var(--muted); margin-bottom:5px; line-height:1.4; }
.iw-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.iw-mgr { font-size:10px; color:var(--muted); }

.legend-row { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted); margin-bottom:6px; }
.legend-row .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

.load-fail-banner {
  display:none; background:var(--red); color:#fff; font-size:12px; padding:8px 14px; border-radius:8px; margin-bottom:14px;
}

/* 반응형: 좁은 화면에서 지도 사이드바 숨김 토글 */
.map-toggle-btn { display:none; }
@media (max-width:768px) {
  .map-side { position:absolute; z-index:20; height:100%; left:-280px; transition:left .2s; }
  .map-side.open { left:0; box-shadow:0 0 30px rgba(0,0,0,.5); }
  .map-toggle-btn {
    display:flex; align-items:center; justify-content:center;
    position:absolute; top:12px; left:12px; z-index:15;
    width:38px; height:38px; background:var(--surface); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:18px; cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
  }
  header { padding:0 10px; gap:8px; }
  .logo { font-size:13px; }
  .page { padding:14px; }
}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="auth-overlay">
  <div class="auth-logo">AZ <span>팀장 대시보드</span></div>
  <div class="auth-sub">(주)에이젯시스템</div>
  <select id="mgr-select">
    <option value="">팀장 선택</option>
  </select>
  <input id="mgr-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') checkMgrLogin()">
  <button onclick="checkMgrLogin()">로그인</button>
  <div id="pw-error">비밀번호가 틀렸습니다.</div>
</div>

<!-- 비밀번호 변경 모달 -->
<div id="pw-change-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:320px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:15px;font-weight:800">비밀번호 변경</div>
    <div id="pwc-step1">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">본인 확인 — 힌트: <b>퇴근8282</b></div>
      <input id="pwc-quiz" type="text" placeholder="힌트 정답 입력" style="width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;box-sizing:border-box">
      <div id="pwc-quiz-error" style="display:none;color:var(--red);font-size:11.5px;margin-top:6px">정답이 틀렸습니다.</div>
      <button onclick="verifyPwQuiz()" style="width:100%;margin-top:12px;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">확인</button>
    </div>
    <div id="pwc-step2" style="display:none">
      <input id="pwc-new1" type="password" placeholder="새 비밀번호" style="width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;box-sizing:border-box;margin-bottom:8px">
      <input id="pwc-new2" type="password" placeholder="새 비밀번호 확인" style="width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;box-sizing:border-box">
      <div id="pwc-save-error" style="display:none;color:var(--red);font-size:11.5px;margin-top:6px"></div>
      <button onclick="submitPwChange()" style="width:100%;margin-top:12px;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">변경하기</button>
    </div>
    <button onclick="closePwChangeModal()" style="width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer">취소</button>
  </div>
</div>

<!-- 헤더 -->
<header>
  <div class="logo">AZ <span>팀장 대시보드</span></div>
  <div class="hdiv"></div>
  <nav class="toptabs" id="toptabs">
    <button class="ttab on" data-page="overview">개요</button>
    <button class="ttab" data-page="route">동선 지도</button>
    <button class="ttab" data-page="staff">사원별 현황</button>
    <button class="ttab" data-page="accounts">거래처 관리</button>
    <button class="ttab" data-page="targets">신규 타겟</button>
  </nav>
  <div class="hright">
    <span class="region-tag" id="region-tag">-</span>
    <span id="hstatus">로딩 중...</span>
    <button class="logout-btn" onclick="openPwChangeModal()">비밀번호 변경</button>
    <button class="logout-btn" id="refresh-btn" onclick="refreshData()">새로고침</button>
    <button class="logout-btn" onclick="mgrLogout()">로그아웃</button>
  </div>
</header>

<div class="main" id="mainArea">
  <div class="loading-overlay" id="globalLoading">
    <div class="spin"></div>
    <div class="load-txt" id="globalLoadTxt">데이터 불러오는 중...</div>
  </div>

  <!-- 개요 -->
  <div class="page on" id="page-overview"></div>

  <!-- 동선 지도 -->
  <div class="page map-page" id="page-route"></div>

  <!-- 사원별 현황 -->
  <div class="page" id="page-staff"></div>

  <!-- 거래처 관리 -->
  <div class="page" id="page-accounts"></div>

  <!-- 신규 타겟 -->
  <div class="page" id="page-targets"></div>

  <!-- 계정 관리 (관리자 전용, 로그인 후 동적으로 탭 노출) -->
  <div class="page" id="page-accountsadmin"></div>
</div>

<script>
// =====================================================
// 설정
// =====================================================
const SS_ID = '1mIXExxFRuZmcy7VKEe_w63Yu1QOqT5r8qondm4k91-c';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbznhjfaRRXQ7rxT63qBiFXnLbEF35yZXu6Cev3M52w05iApZ3dtMmDOA5PfRA2vILjpcQ/exec';
const GID = {
  active: '0',
  new: '2043143991',
  dormant: '1615833992',
  plan: '1621770753',
  top5: '299724501',
  origin: '399280512'
};
const COMPANY = { lat:35.2162723, lng:126.8245735, name:'(주)에이젯시스템' };
const COLORS = { active:'#3b82f6', new:'#27ae60', dormant:'#888888', target:'#f5a623', route:'#5c6ef8' };

// 로그인 선택지에 표시할 계정 ID 목록 — 비밀번호는 서버(WebApp.gs)에서만 검증하며 클라이언트로 내려받지 않음
const DEFAULT_MANAGER_IDS = ['관리자','광주팀장','전남동부팀장','전남서부팀장','전북팀장'];
const REGION_STAFF = {
  // '관리자'는 지역별 배정과 무관하게 항상 전체 데이터를 봄 (isStaffInScope에서 특수 처리)
  // 입퇴사 등으로 담당자가 바뀌면 아래 배열만 직접 수정하면 됨
  '광주':     ['김미남광주','김미남','류민상','심규현','강경현광주','황지환'],
  '전남동부':  ['서한결','이동현','조준헌'],
  '전남서부':  ['임치현','나규호','천경준'],
  '전북':     ['김동국','김현우','최선영','정기태']
};

// =====================================================
// 상태
// =====================================================
let CUR_MGR = null;      // 로그인한 팀장 ID
let CUR_REGION = null;   // 담당 지역
let CUR_STAFF = [];      // 담당 지역 소속 사원 목록 (필터링 기준)
let CUR_MGR_PW = null;   // 세션 동안만 메모리에 유지 (비밀번호 변경/관리자 열람 시 서버 재검증용, localStorage엔 저장하지 않음)

let data = { active:[], new:[], dormant:[], plan:[], top5raw:[], origin:[] };
let loadFailed = { active:false, new:false, dormant:false, plan:false, top5:false, origin:false };
let prospects = [];

let mgrMap = null;        // 동선 지도 kakao.maps.Map 인스턴스
let mgrMarkers = [];
let mgrPolylines = [];
let curIW = null;
function clearIW() { if (curIW) { curIW.setMap(null); curIW = null; } }

// =====================================================
// 로그인 (팀장계정 시트 기반, 서버에서 직접 검증 — 비밀번호를 클라이언트로 내려받지 않음)
// =====================================================
function initMgrSelect() {
  const sel = document.getElementById('mgr-select');
  sel.innerHTML = '<option value="">팀장 선택</option>';
  DEFAULT_MANAGER_IDS.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
}
initMgrSelect();

async function checkMgrLogin() {
  const id = document.getElementById('mgr-select').value;
  const pw = document.getElementById('mgr-pw').value;
  const err = document.getElementById('pw-error');

  if (!id) { err.style.display='block'; err.textContent='팀장을 선택해주세요.'; return; }
  if (!pw) { err.style.display='block'; err.textContent='비밀번호를 입력해주세요.'; return; }

  err.style.display = 'none';
  const loginBtn = document.querySelector('#auth-overlay button');
  if (loginBtn) { loginBtn.disabled = true; loginBtn.textContent = '확인 중...'; }

  try {
    const res = await fetch(WEBAPP_URL, {
      method:'POST',
      body: JSON.stringify({ action:'login', id, pw })
    });
    const json = await res.json();
    if (!json.success) {
      err.style.display='block'; err.textContent = json.msg || '비밀번호가 틀렸습니다.';
      document.getElementById('mgr-pw').value='';
      return;
    }

    document.getElementById('auth-overlay').style.display = 'none';
    // 비밀번호는 localStorage에 저장하지 않음 — 세션 유지를 위해 id/region만 저장, 재검증은 세션 내 메모리 값 사용
    localStorage.setItem('az_mgr_auth', '1');
    localStorage.setItem('az_mgr_id', id);
    localStorage.setItem('az_mgr_region', json.region || '');
    CUR_MGR = id;
    CUR_MGR_PW = pw;
    CUR_REGION = json.region || '';
    CUR_STAFF = REGION_STAFF[CUR_REGION] || [];
    document.getElementById('region-tag').textContent = CUR_REGION || '-';
    document.getElementById('hstatus').textContent = `${id} 님 | 데이터 로딩 중...`;
    setupAdminTabIfNeeded();
    bootAfterLogin();
    // 초기 비밀번호(0308) 사용 중이면 변경 유도 (서버가 mustChangePw로 알림)
    if (json.mustChangePw) {
      setTimeout(() => {

}

// CSV 유틸 (az_sales_map.html 재사용)
// =====================================================
async function fetchCsvWithRetry(url, maxRetry = 3) {
  let lastErr;
  for (let attempt = 1; attempt <= maxRetry; attempt++) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const txt = await res.text();
      if (!txt || !txt.trim()) throw new Error('empty response');
      const head = txt.trim().toLowerCase();
      if (head.startsWith('<!doctype') || head.startsWith('<html')) {
        throw new Error('시트 접근 권한 오류로 추정됨 (HTML 응답 수신) — 공유 설정 확인 필요');
      }
      return txt;
    } catch (e) {
      lastErr = e;
      if (attempt < maxRetry) await new Promise(r => setTimeout(r, attempt * 800));
    }
  }
  throw lastErr;
}

function parseCSVRaw(txt) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  const s = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQ) {
      if (ch === '"') { if (s[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur=''; }
      else if (ch === '\n') { row.push(cur); cur=''; rows.push(row); row=[]; }
      else cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

// requiredKey: 유효 데이터 판단 기준 컬럼명 (시트별로 다름)
function parseCSV(txt, requiredKey) {
  const rows = parseCSVRaw(txt);
  if (rows.length < 2) return [];
  const hdrs = rows[0].map(h => h.trim());
  return rows.slice(1)
    .filter(r => r.some(v => v.trim()))
    .map(vals => {
      const obj = {};
      hdrs.forEach((h,i) => { obj[h] = (vals[i]||'').trim(); });
      return obj;
    })
    .filter(r => requiredKey ? r[requiredKey] : true);
}

function csvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SS_ID}/export?format=csv&gid=${gid}`;
}

// 거래처명 정규화: 공백 제거 + (주)/㈜/주식회사 표기 통일 (매칭 정확도 개선용, 완전한 해결책은 아님)
function normName(s) {
  return String(s||'').trim()
    .replace(/\s+/g,'')
    .replace(/\(주\)|㈜|주식회사/g, '');
}

// 거래처명 → {담당자, 주소} 매핑 (기존+신규+휴면 통합, 품목현황 등에서 지역/담당자 매칭용)
function buildAccountLookup() {
  const map = new Map();
  [...data.active, ...data.new, ...data.dormant].forEach(r => {
    const key = normName(r['거래처명']);
    if (key && !map.has(key)) map.set(key, { 담당자: r['담당자']||'', 주소: r['주소']||'' });
  });
  return map;
}

// 거래처명(정규화) → 주요품목 TOP3 요약 문자열 맵. 거래처별주요품목 시트(top5raw) 기준.
// 각 항목 "품목(원산지/브랜드)" 형태로 최대 3개까지.
let _top3ByAcctCache = null;
function buildTop3ByAccount() {
  if (_top3ByAcctCache) return _top3ByAcctCache;
  const map = new Map();
  data.top5raw.forEach(r => {
    const key = normName(r['거래처명']);
    if (!key) return;
    const items = [];
    for (let i=1;i<=3;i++) {
      const nm = r[`TOP${i}_품목`];
      if (!nm) continue;
      const origin = r[`TOP${i}_원산지`] || '';
      const brand = r[`TOP${i}_브랜드`] || '';
      const tag = [origin, brand].filter(Boolean).join('/');
      items.push(tag ? `${nm}(${tag})` : String(nm));
    }
    if (items.length) map.set(key, items);
  });
  _top3ByAcctCache = map;
  return map;
}

// 주소 문자열에서 시/도 단위 지역명 추출 (광주/전남/전북 등)
function extractSido(addr) {
  if (!addr) return '기타';
  const s = String(addr).trim();
  if (s.startsWith('광주')) return '광주';
  if (s.startsWith('전남') || s.startsWith('전라남도')) return '전남';
  if (s.startsWith('전북') || s.startsWith('전라북도') || s.startsWith('전북특별자치도')) return '전북';
  return '기타';
}

// 현재 팀장 지역(광주/전남동부/전남서부/전북/관리자)에 해당하는 주소 시/도 목록 반환.
// 미개척 타겟·거래처는 주소만 있고 담당자 세부 배정이 없어 시/도 수준으로만 필터 가능.
// 전남동부/전남서부는 주소상 구분이 불가능하므로 둘 다 '전남' 전체를 봄. 관리자는 전체(null=제한없음).
function regionSidos() {
  if (CUR_REGION === '관리자' || !CUR_REGION) return null; // null = 전체 허용
  if (CUR_REGION === '광주') return ['광주'];
  if (CUR_REGION === '전북') return ['전북'];
  if (CUR_REGION === '전남동부' || CUR_REGION === '전남서부' || CUR_REGION === '전남') return ['전남'];
  return null;
}

// 주소가 현재 팀장 지역 범위에 드는지 판정 (관리자/미설정이면 항상 true)
function addrInRegionScope(addr) {
  const sidos = regionSidos();
  if (!sidos) return true;
  return sidos.includes(extractSido(addr));
}

// 주소에서 시군구 추출 (예: "전북특별자치도 전주시 완산구 ..." → "전주시", "광주광역시 북구 ..." → "북구")
function extractSigungu(addr) {
  if (!addr) return '';
  const s = String(addr).trim();
  // 시/도 다음의 첫 '시' 또는 '군' 또는 '구' 단위 토큰
  const m = s.match(/(?:광주광역시|전라남도|전라북도|전북특별자치도|전남|전북)\s+(\S+?(?:시|군|구))/);
  if (m) return m[1];
  // 시/도 표기가 생략된 경우 첫 토큰에서 추출 시도
  const m2 = s.match(/(\S+?(?:시|군|구))/);
  return m2 ? m2[1] : '';
}

// 개요 필터: 현재 팀장이 볼 수 있는 지역(시/도) 목록. 관리자는 광주/전남/전북 전체.
function ovRegionOptions() {
  if (CUR_REGION === '관리자' || !CUR_REGION) return ['광주','전남','전북'];
  const sidos = regionSidos();
  return sidos || ['광주','전남','전북'];
}

// 개요 필터: 특정 시/도에 속한 거래처들의 시군구 목록 (데이터 기반, 실제 존재하는 것만)
function ovSigunguOptions(sido) {
  const set = new Set();
  [...data.active, ...data.new, ...data.dormant].forEach(r => {
    if (extractSido(r['주소']) === sido) {
      const g = extractSigungu(r['주소']);
      if (g) set.add(g);
    }
  });
  return [...set].sort();
}

// 개요 필터: 현재 팀장 지역 소속 사원만. 관리자는 전체 담당자.
function ovStaffOptions() {
  if (CUR_REGION === '관리자' || !CUR_REGION) {
    const set = new Set();
    [...data.active, ...data.new, ...data.dormant].forEach(r => { if (r['담당자']) set.add(r['담당자']); });
    return [...set].sort();
  }
  // 팀장: REGION_STAFF 배정 사원 중 실제 데이터에 등장하는 사람만
  const assigned = new Set(CUR_STAFF);
  const set = new Set();
  [...data.active, ...data.new, ...data.dormant].forEach(r => {
    if (r['담당자'] && assigned.has(r['담당자'])) set.add(r['담당자']);
  });
  return [...set].sort();
}

function escHtml(s) { return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 신규영업처 "방문 완료" 판단 — az_sales_map.html에서 두 경로로 각각 기록됨을 감안해 합산
//  ① 신규영업처 시트: 카드에서 직접 "방문 체크"/"메모 작성" → prospects의 방문여부
//  ② 영업계획 시트: "경로(영업계획)에 추가" 후 동선에서 체크 → data.plan에서 유형='신규영업처' + 방문완료=true
// 거래처명 기준 정확 매칭(normName)으로 합치며, 표기 차이로 인한 매칭 누락 가능성은 있음
function buildVisitedProspectSet() {
  const visited = new Set();
  prospects.forEach(p => {
    if (String(p['방문여부']).trim().toLowerCase() === 'true') {
      visited.add(normName(p['업체명']));
    }
  });
  data.plan.forEach(r => {
    if (r['유형'] === '신규영업처' && String(r['방문완료']).trim().toLowerCase() === 'true') {
      visited.add(normName(r['거래처명']));
    }
  });
  return visited;
}

// 신규 개척 목적의 영업계획 행 여부 — '신규'(신규거래처 목록에서 선택) + '신규영업처'(신규영업처를 경로에 추가) 둘 다 포함

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '새로고침 중...'; }
  document.getElementById('globalLoading').classList.remove('hide');
  try {
    await loadAllData();
    document.getElementById('hstatus').textContent = `${CUR_MGR} 님 | ${CUR_REGION} 담당`;
    renderedTabs.forEach(key => {
      if (key === 'route') {
        // mgrMap 인스턴스를 유지한 채 마커/목록만 다시 그림
        renderRoute();
      } else if (key === 'accounts') {
        // acctMapInst 인스턴스를 유지한 채 목록/마커만 다시 그림
        fillAcctStaffOptions();
        renderAccountsTable();
        renderAccountsMap();
      } else {
        TAB_RENDERERS[key]();
      }
    });
  } finally {
    document.getElementById('globalLoading').classList.add('hide');
    if (btn) { btn.disabled = false; btn.textContent = '새로고침'; }
  }
}

function setLoadTxt(t) { const el = document.getElementById('globalLoadTxt'); if (el) el.textContent = t; }

async function loadAllData() {
  _top3ByAcctCache = null; // 데이터 재로드 시 주요품목 캐시 무효화
  const sheetJobs = [
    ['active','기존거래처','거래처명'],
    ['new','신규거래처','거래처명'],
    ['dormant','휴면거래처','거래처명'],
    ['plan','영업계획','사원명'],
    ['top5','거래처별주요품목','거래처명'],
    ['origin','원산지검토','업체명']
  ];
  for (const [key,label,reqKey] of sheetJobs) {
    setLoadTxt(`${label} 로딩 중...`);
    try {
      const txt = await fetchCsvWithRetry(csvUrl(GID[key]));
      const parsed = parseCSV(txt, reqKey);
      data[key === 'top5' ? 'top5raw' : key] = parsed;
      loadFailed[key] = false;
    } catch(e) {
      console.error(key, e);
      loadFailed[key] = true;
      if (key === 'plan') {
        // 영업계획: 실사용 전이라 데이터 없을 수 있음 — 실패로 취급하지 않고 조용히 빈 배열
        loadFailed.plan = false;
        data.plan = [];
      }
    }
  }

  setLoadTxt('신규영업처 로딩 중...');
  try {
    const res = await fetch(WEBAPP_URL + '?action=getProspects');
    const json = await res.json();
    prospects = (json.success && json.data) ? json.data : [];
  } catch(e) {
    console.error('prospects', e);
    prospects = [];
  }

  showLoadFailBanner();
}

function showLoadFailBanner() {
  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처', top5:'주요품목', origin:'원산지검토' };
  const failed = Object.keys(loadFailed).filter(k => loadFailed[k] && labels[k]);
  // 배너는 개요 페이지 상단에 삽입 (렌더 시 처리)
  window._loadFailedNames = failed.map(k => labels[k]);
}

// 개요 필터 공용: 지역별일 때 값(시/도) 변경 시 세부지역(시군구) 드롭다운 채우기
function fillOvSubOptions(typeSel, valSel, subSel) {
  if (typeSel.value !== 'region') {
    subSel.style.display = 'none';
    subSel.innerHTML = '';
    return;
  }
  const gus = ovSigunguOptions(valSel.value);
  if (!gus.length) {
    subSel.style.display = 'none';
    subSel.innerHTML = '';
    return;
  }
  subSel.style.display = '';
  subSel.innerHTML = '<option value="">전체 시군구</option>' + gus.map(g => `<option value="${escHtml(g)}">${escHtml(g)}</option>`).join('');
}

// 개요 필터 공용: 현재 필터 조건으로 행 필터링 (type/val/sub 3단)
function applyOvFilter(rows, type, val, sub) {
  if (type === 'region') {
    rows = rows.filter(r => extractSido(r['주소']) === val);
    if (sub) rows = rows.filter(r => extractSigungu(r['주소']) === sub);
  } else if (type === 'staff') {
    rows = rows.filter(r => r['담당자'] === val);
  }
  return rows;
}

function renderOvItemTop3() {
  const type = document.getElementById('ov-item-filter-type').value;
  const val = document.getElementById('ov-item-filter-value').value;
  const sub = document.getElementById('ov-item-filter-sub').value;
  const lookup = buildAccountLookup();

  const itemTotals = {};
  const itemOriginCnt = {};
  const itemBrandCnt = {};
  data.top5raw.forEach(r => {
    if (type !== 'all') {
      const info = lookup.get(normName(r['거래처명']));
      if (!info) return; // 매칭 안 되면 필터 적용 시 제외
      if (type === 'region') {
        if (extractSido(info.주소) !== val) return;
        if (sub && extractSigungu(info.주소) !== sub) return;
      }
      if (type === 'staff' && info.담당자 !== val) return;
    }
    for (let i=1;i<=5;i++) {
      const nm = r[`TOP${i}_품목`], kg = parseFloat(r[`TOP${i}_KG`]), origin = r[`TOP${i}_원산지`], brand = r[`TOP${i}_브랜드`];
      if (!nm || isNaN(kg)) continue;
      itemTotals[nm] = (itemTotals[nm]||0) + kg;
      if (origin) {
        if (!itemOriginCnt[nm]) itemOriginCnt[nm] = {};
        itemOriginCnt[nm][origin] = (itemOriginCnt[nm][origin]||0) + 1;
      }
      if (brand) {
        if (!itemBrandCnt[nm]) itemBrandCnt[nm] = {};
        itemBrandCnt[nm][brand] = (itemBrandCnt[nm][brand]||0) + 1;
      }
    }
  });
  function topOf(cntMap, nm) {
    const oc = cntMap[nm];
    if (!oc) return '';
    return Object.entries(oc).sort((a,b)=>b[1]-a[1])[0][0];
  }
  const topItems = Object.entries(itemTotals).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const holder = document.getElementById('ov-item-top3');
  if (!holder) return;
  holder.innerHTML = topItems.length ? topItems.map(([nm,kg],i) => {
    const max = topItems[0][1];
    const origin = topOf(itemOriginCnt, nm);
    const brand = topOf(itemBrandCnt, nm);
    const tagParts = [origin, brand].filter(Boolean);
    return `<div class="barrow">
      <div class="blabel">${i+1}. ${escHtml(nm)}${tagParts.length?` <span style="color:var(--muted);font-weight:400">(${tagParts.map(escHtml).join(', ')})</span>`:''}</div>
      <div class="btrack"><div class="bfill" style="width:${Math.max(6,kg/max*100)}%"></div></div>
      <div class="bval">${kg.toLocaleString()}kg</div>
    </div>`;
  }).join('') : `<div class="empty-hint">해당 조건에 데이터가 없습니다.</div>`;
}

function parseDateLoose(s) {
  if (!s) return null;
  const t = String(s).trim();
  let m = t.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = t.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}
function daysSince(dateObj) {
  if (!dateObj) return null;
  return Math.floor((Date.now() - dateObj.getTime()) / 86400000);
}

// staffPeriod 기준으로 [from, to] Date 범위를 계산 (to는 당일 23:59:59 포함)
function getStaffDateRange() {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (staffPeriod.mode === 'today') {
    return [todayStart, new Date(todayStart.getTime()+86400000-1)];
  }
  if (staffPeriod.mode === '7d') {
    return [new Date(todayStart.getTime()-6*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  if (staffPeriod.mode === '30d') {
    return [new Date(todayStart.getTime()-29*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  // custom
  const from = staffPeriod.from ? parseDateLoose(staffPeriod.from) : null;
  const to = staffPeriod.to ? parseDateLoose(staffPeriod.to) : null;
  return [from, to ? new Date(to.getTime()+86400000-1) : null];
}

function renderStaffContent() {
  const holder = document.getElementById('staff-content');
  if (!holder) return;
  const [rangeFrom, rangeTo] = getStaffDateRange();

  const active = filterByScope(data.active);
  const newC = filterByScope(data.new);
  const dormant = filterByScope(data.dormant);
  const plan = filterByScope(data.plan).filter(r => {
    const d = parseDateLoose(r['날짜']);
    if (!d) return false;
    if (rangeFrom && d < rangeFrom) return false;
    if (rangeTo && d > rangeTo) return false;
    return true;
  });
  const myProspects = prospects.filter(p => isStaffInScope(p['등록자'])).filter(p => {
    const d = parseDateLoose(p['등록일']);
    if (!d) return false;
    if (rangeFrom && d < rangeFrom) return false;
    if (rangeTo && d > rangeTo) return false;
    return true;
  });

  const staffSet = new Set();
  [...filterByScope(data.active),...filterByScope(data.new),...filterByScope(data.dormant),...filterByScope(data.plan)]
    .forEach(r => { const n = r['담당자']||r['사원명']; if (n) staffSet.add(n); });
  prospects.filter(p => isStaffInScope(p['등록자'])).forEach(p => { if (p['등록자']) staffSet.add(p['등록자']); });
  const staffList = [...staffSet].sort();

  function countBy(rows, key) {
    const m = {}; rows.forEach(r => { const n = r[key]; if (n) m[n] = (m[n]||0)+1; }); return m;
  }
  const activeCnt = countBy(active, '담당자');
  const newCnt = countBy(newC, '담당자');
  const dormantCnt = countBy(dormant, '담당자');
  const prospectCnt = countBy(myProspects, '등록자');

  function planStats(name) {
    const rows = plan.filter(r => r['사원명'] === name);
    const done = rows.filter(r => String(r['방문완료']).trim().toLowerCase() === 'true').length;
    return { total: rows.length, done, rate: rows.length ? Math.round(done/rows.length*100) : null };
  }
  // 신규영업처 등록 건 대비 방문 처리 비율 — 등록은 신규영업처 시트 기준(기간 내 등록분),
  // 방문 처리 여부는 신규영업처 시트 직접체크 + 영업계획(유형='신규영업처') 체크 둘 다 합산해서 판단
  const visitedProspectSet = buildVisitedProspectSet();
  function prospectVisitStats(name) {
    const rows = myProspects.filter(p => p['등록자'] === name);
    const visited = rows.filter(p => visitedProspectSet.has(normName(p['업체명']))).length;
    return { total: rows.length, visited, rate: rows.length ? Math.round(visited/rows.length*100) : null };
  }
  function resultDist(name) {
    const rows = myProspects.filter(p => p['등록자'] === name);
    const dist = { 성공:0, 보류:0, 실패:0, 관심:0, '':0 };
    rows.forEach(p => { const r = String(p['결과']||'').trim(); dist[r] = (dist[r]||0)+1; });
    return dist;
  }

  holder.innerHTML = `
    <div class="section-title">사원별 거래처 현황</div>
    <div class="card">
      <div class="stat-sub" style="margin-bottom:10px">
        기존·신규·휴면은 현재 시점 거래처 수입니다(선택 기간과 무관). '신규영업처 방문수'는 선택 기간에 등록된 신규영업처 중 실제 방문 처리된 건수입니다.
      </div>
      ${staffList.length ? `
        <table class="dt">
          <thead><tr><th>사원명</th><th>기존</th><th>신규</th><th>휴면</th><th>신규영업처 방문수</th></tr></thead>
          <tbody>
            ${staffList.map(name => {
              const pv = prospectVisitStats(name);
              return `<tr>
                <td style="font-weight:600">${escHtml(name)}</td>
                <td>${activeCnt[name]||0}</td>
                <td><span class="badge b-green">${newCnt[name]||0}</span></td>
                <td><span class="badge b-gray">${dormantCnt[name]||0}</span></td>
                <td>${pv.visited > 0 ? `<span class="badge b-green">${pv.visited}건</span>` : '<span style="color:var(--muted)">0건</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-hint">담당 사원 데이터가 없습니다.</div>`}
    </div>

    <div class="section-title">신규영업처 결과 분포 (선택 기간 등록분)</div>
    <div class="card">
      ${staffList.length ? staffList.map(name => {
        const dist = resultDist(name);
        const total = Object.values(dist).reduce((a,b)=>a+b,0);
        if (!total) return '';
        return `<div style="margin-bottom:14px">
          <div style="font-size:12.5px;font-weight:600;margin-bottom:6px">${escHtml(name)} <span style="color:var(--muted);font-weight:400">(${total}건)</span></div>
          <div style="display:flex;gap:4px;height:10px;border-radius:5px;overflow:hidden">
            ${dist['성공'] ? `<div style="background:var(--green);width:${dist['성공']/total*100}%" title="성공 ${dist['성공']}"></div>` : ''}
            ${dist['관심'] ? `<div style="background:var(--blue);width:${dist['관심']/total*100}%" title="관심 ${dist['관심']}"></div>` : ''}
            ${dist['보류'] ? `<div style="background:var(--orange);width:${dist['보류']/total*100}%" title="보류 ${dist['보류']}"></div>` : ''}
            ${dist['실패'] ? `<div style="background:var(--red);width:${dist['실패']/total*100}%" title="실패 ${dist['실패']}"></div>` : ''}
            ${dist[''] ? `<div style="background:var(--muted);width:${dist['']/total*100}%" title="미정 ${dist['']}"></div>` : ''}
          </div>
        </div>`;
      }).join('') : `<div class="empty-hint">데이터 없음</div>`}
    </div>
  `;
}

// 검색어(거래처명/담당자) + 담당자 선택 + 현재 필터 적용된 목록 반환 (지도·테이블·CSV 공용)
function getAcctFilteredRows() {
  let rows = filterByScope(data[acctFilter]);
  if (acctStaffFilter) {
    rows = rows.filter(r => r['담당자'] === acctStaffFilter);
  }
  if (acctSearchTerm) {
    const term = acctSearchTerm.toLowerCase();
    rows = rows.filter(r =>
      String(r['거래처명']||'').toLowerCase().includes(term) ||
      String(r['담당자']||'').toLowerCase().includes(term)
    );
  }
  return rows.map(r => ({ ...r, _days: daysSince(parseDateLoose(r['마지막거래일'])) }));
}

function renderAccountsTable() {
  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처' };

  const sorted = acctFilter === 'dormant'
    ? [...rows].sort((a,b)=>(b._days||0)-(a._days||0))

  const top3map = buildTop3ByAccount();

  holder.innerHTML = `

// 거래처명(행) 클릭 시 해당 좌표로 지도 이동 + 인포윈도우 표시
function bindAcctRowClicks() {
  document.querySelectorAll('.acct-row[data-lat]').forEach(el => {
    el.onclick = () => {
      const lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
      if (isNaN(lat) || isNaN(lng) || !acctMapInst) return;
      const pos = new kakao.maps.LatLng(lat, lng);
      acctMapInst.setLevel(5);
      acctMapInst.panTo(pos);
      clearIW();
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.4,
        content:`<div class="iw"><div class="iw-name">${escHtml(el.dataset.name)}</div></div>`
      });
      curIW.setMap(acctMapInst);

// 현재 필터/검색 기준 목록을 CSV로 내보냄 (엑셀에서 한글 깨짐 방지를 위해 BOM 포함)
function exportAcctCsv() {
  const labels = { active:'기존거래처', new:'신규거래처', dormant:'휴면거래처' };
  const rows = getAcctFilteredRows();
  if (!rows.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const headers = ['거래처명','담당자','주소','마지막거래일','경과일'];
  const csvRows = [headers.join(',')];
  rows.forEach(r => {
    const line = [r['거래처명'], r['담당자'], r['주소'], r['마지막거래일'], r._days!=null?r._days:'']
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',');
    csvRows.push(line);
  });
  const csvContent = '\uFEFF' + csvRows.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${labels[acctFilter]}_${CUR_REGION}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

let acctMapInst = null, acctMapMarkers = [];
function renderAccountsMap() {
  const el = document.getElementById('acctMap');
  if (!el) return;
  clearIW();
  if (!acctMapInst) {
    acctMapInst = new kakao.maps.Map(el, { center:new kakao.maps.LatLng(COMPANY.lat,COMPANY.lng), level:9 });
  } else {
    kakao.maps.event.trigger(acctMapInst, 'resize');
  }
  acctMapMarkers.forEach(m => m.setMap(null));
  acctMapMarkers = [];
  const rows = getAcctFilteredRows();
  const color = COLORS[acctFilter];
  const bounds = new kakao.maps.LatLngBounds();
  let any = false;
  rows.forEach(r => {
    const lat = parseFloat(r['위도']), lng = parseFloat(r['경도']);
    if (isNaN(lat) || isNaN(lng)) return;
    any = true;
    const pos = new kakao.maps.LatLng(lat,lng);
    bounds.extend(pos);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"><circle cx="7" cy="7" r="6" fill="${color}" stroke="white" stroke-width="1.5"/></svg>`;
    const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
    const marker = new kakao.maps.Marker({ position:pos, map:acctMapInst, image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(14,14)) });
    kakao.maps.event.addListener(marker, 'click', () => {
      clearIW();
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.4,
        content:`<div class="iw"><div class="iw-name">${escHtml(r['거래처명'])}</div><div class="iw-addr">${escHtml(r['주소']||'')}</div><div class="iw-mgr">담당: ${escHtml(r['담당자']||'-')}</div></div>`
      });
      curIW.setMap(acctMapInst);
    });
    acctMapMarkers.push(marker);
  });
  if (any) acctMapInst.setBounds(bounds);
}

function getFilteredTargets() {
  const existingNames = new Set([...data.active, ...data.new].map(r => normName(r['거래처명'])));
  let targets = data.origin.filter(r => {
    const use = String(r['수입육사용']||'').trim();
    return (use === 'O' || use === '') && !existingNames.has(normName(r['업체명']));
  });
  // 원산지검토 시트에 동일 업체가 중복 적재된 경우(OriginCheck 이중 flush 잔재) 업체명+주소 기준 1건으로 정리
  const seen = new Set();
  targets = targets.filter(t => {
    const key = normName(t['업체명']) + '|' + normName(t['주소']);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  // 지역 팀장은 본인 지역(주소 시/도) 타겟만 조회. 관리자는 전체.
  targets = targets.filter(t => addrInRegionScope(t['주소']));
  if (targetFilterCat) {
    targets = targets.filter(t => (t['카테고리']||'') === targetFilterCat);
  }
  if (targetFilterKw) {
    // 영업품목 컬럼이 비어있는 경우가 많아, 업체명·영업품목 양쪽에서 키워드를 매칭한다.
    targets = targets.filter(t =>
      String(t['영업품목']||'').includes(targetFilterKw) ||
      String(t['업체명']||'').includes(targetFilterKw)
    );
  }
  return targets;
}

function renderTargetsContent() {
  const targets = getFilteredTargets();
  const visitedSet = buildVisitedProspectSet();
  const catCnt = {};
  targets.forEach(t => { const c = t['카테고리']||'기타'; catCnt[c] = (catCnt[c]||0)+1; });

  const summaryHolder = document.getElementById('target-summary-cards');
  if (summaryHolder) {
    summaryHolder.innerHTML = `
      <div class="card">
        <div class="card-title">${targetFilterCat || targetFilterKw ? '필터 결과' : '미개척 타겟'}</div>
        <div class="stat-num gold">${targets.length}</div>
        <div class="stat-sub">${targetFilterKw ? targetFilterKw : targetFilterCat ? targetFilterCat : '수입육 사용 의심 · 미거래'}</div>
      </div>
      ${Object.entries(catCnt).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n]) => `
        <div class="card">
          <div class="card-title">${escHtml(c)}</div>
          <div class="stat-num">${n}</div>
          <div class="stat-sub">타겟 업체 수</div>
        </div>
      `).join('')}
    `;
  }

  const tableHolder = document.getElementById('target-table-holder');
  if (tableHolder) {
    tableHolder.innerHTML = targets.length ? `
      <table class="dt">
        <thead><tr><th>업체명</th><th>카테고리</th><th>수입육사용</th><th>발견일</th><th>방문</th></tr></thead>
        <tbody>
          ${targets.map(t => {
            const lat = parseFloat(t['위도']), lng = parseFloat(t['경도']);
            const hasPos = !isNaN(lat) && !isNaN(lng);
            return `<tr class="target-row" ${hasPos?`data-lat="${lat}" data-lng="${lng}" data-name="${escHtml(t['업체명'])}" style="cursor:pointer"`:''}>
            <td style="${hasPos?'color:var(--accent);text-decoration:underline':''}">${escHtml(t['업체명'])}</td>
            <td>${escHtml(t['카테고리']||'-')}</td>
            <td><span class="badge ${t['수입육사용']==='O'?'b-red':'b-gray'}">${escHtml(t['수입육사용']||'미확인')}</span></td>
            <td>${escHtml(t['발견일']||'-')}</td>
            <td>${visitedSet.has(normName(t['업체명'])) ? '🚩' : ''}</td>
          </tr>`;
          }).join('')}
        </tbody>
      </table>` : `<div class="empty-hint">해당 조건의 미개척 타겟이 없습니다.</div>`;

    // 업체명 클릭 시 지도 이동 + 인포윈도우
    tableHolder.querySelectorAll('.target-row[data-lat]').forEach(el => {
      el.onclick = () => {
        const lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
        if (isNaN(lat) || isNaN(lng) || !targetMapInst) return;
        const pos = new kakao.maps.LatLng(lat, lng);
        targetMapInst.setLevel(5);
        targetMapInst.panTo(pos);
        clearIW();
        curIW = new kakao.maps.CustomOverlay({
          position:pos, yAnchor:1.4,
          content:`<div class="iw"><div class="iw-name">${escHtml(el.dataset.name)}</div></div>`
        });
        curIW.setMap(targetMapInst);
      };
    });
  }

  renderTargetsMap(targets, visitedSet);
}

function renderTargetsMap(targets, visitedSet) {
  if (!targetMapInst) return;
  clearIW();
  if (window._targetMapMarkers) window._targetMapMarkers.forEach(m => m.setMap(null));
  window._targetMapMarkers = [];

  const bounds = new kakao.maps.LatLngBounds();
  let any = false;
  targets.forEach(t => {
    const lat = parseFloat(t['위도']), lng = parseFloat(t['경도']);
    if (isNaN(lat) || isNaN(lng)) return;
    any = true;
    const pos = new kakao.maps.LatLng(lat,lng);
    bounds.extend(pos);
    const isVisited = visitedSet.has(normName(t['업체명']));
    // 방문완료: 깃발 이모지 마커 / 미방문: 기존 점 마커
    let markerImg;
    if (isVisited) {
      const flagSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="26"><text x="11" y="20" font-size="20" text-anchor="middle">🚩</text></svg>`;
      const flagUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(flagSvg)));
      markerImg = new kakao.maps.MarkerImage(flagUrl, new kakao.maps.Size(22,26), { offset:new kakao.maps.Point(11,24) });
    } else {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"><circle cx="7" cy="7" r="6" fill="${COLORS.target}" stroke="white" stroke-width="1.5"/></svg>`;
      const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      markerImg = new kakao.maps.MarkerImage(url, new kakao.maps.Size(14,14));
    }
    const marker = new kakao.maps.Marker({ position:pos, map:targetMapInst, image:markerImg });
    kakao.maps.event.addListener(marker, 'click', () => {
      clearIW();
      curIW = new kakao.maps.CustomOverlay({
        position:pos, yAnchor:1.4,
        content:`<div class="iw"><div class="iw-name">${isVisited?'🚩 ':''}${escHtml(t['업체명'])}</div><div class="iw-addr">${escHtml(t['카테고리']||'')}</div></div>`
      });
      curIW.setMap(targetMapInst);
    });
    window._targetMapMarkers.push(marker);
  });
  if (any) targetMapInst.setBounds(bounds);
}

// =====================================================
// 동선 지도 탭
// =====================================================
let routePeriod = { mode: 'today', from: null, to: null };

function initRoutePage() {
  const page = document.getElementById('page-route');
  const staffSet = new Set();
  filterByScope(data.plan).forEach(r => { if (r['사원명']) staffSet.add(r['사원명']); });
  const staffList = [...staffSet].sort();

  page.innerHTML = `
    <div class="map-shell">
      <div class="map-side">
        <div class="map-side-sec">
          <div class="map-side-label">사원 선택</div>
          <select id="route-staff-sel" style="width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12.5px">
            <option value="">전체</option>
            ${staffList.map(s => `<option value="${escHtml(s)}">${escHtml(s)}</option>`).join('')}
          </select>
        </div>
        <div class="map-side-sec">
          <div class="map-side-label">기간</div>
          <div class="filterbar" id="route-period-bar" style="gap:6px">
            <button class="chip-btn" data-period="today" style="padding:5px 10px;font-size:11px">오늘</button>
            <button class="chip-btn" data-period="7d" style="padding:5px 10px;font-size:11px">7일</button>
            <button class="chip-btn" data-period="30d" style="padding:5px 10px;font-size:11px">한달</button>
          </div>
          <div id="route-period-note" style="display:none;font-size:10.5px;color:var(--muted);margin-top:6px">여러 날짜의 동선을 날짜별로 다른 색 선으로 표시합니다.</div>
        </div>
        <div class="map-side-sec">
          <div class="map-side-label">범례</div>
          <div class="legend-row"><span class="dot" style="background:${COLORS.route}"></span>동선 순서</div>
          <div class="legend-row"><span class="dot" style="background:var(--green)"></span>방문완료</div>
          <div class="legend-row"><span class="dot" style="background:${COLORS.active}"></span>미방문</div>
        </div>
        <div class="map-side-label" style="padding:10px 14px 0">방문 목록</div>
        <div class="route-list" id="route-list"></div>
      </div>
      <div class="map-wrap">
        <button class="map-toggle-btn" onclick="document.querySelector('#page-route .map-side').classList.toggle('open')">☰</button>
        <div id="mgrMap"></div>
      </div>
    </div>
  `;

  mgrMap = new kakao.maps.Map(document.getElementById('mgrMap'), {
    center:new kakao.maps.LatLng(COMPANY.lat,COMPANY.lng), level:9
  });

  document.getElementById('route-staff-sel').onchange = renderRoute;
  document.getElementById('route-period-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-period]');
    if (!btn) return;
    routePeriod.mode = btn.dataset.period;
    updateRoutePeriodButtons();
    renderRoute();
  });
  updateRoutePeriodButtons();
  renderRoute();
}

function updateRoutePeriodButtons() {
  document.querySelectorAll('#route-period-bar [data-period]').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.period === routePeriod.mode);
  });
  document.getElementById('route-period-note').style.display = routePeriod.mode === 'today' ? 'none' : '';
}

function renderRoute() {
  const staffSel = document.getElementById('route-staff-sel').value;
  const [rangeFrom, rangeTo] = getRoutePeriodRange();

  let rows = filterByScope(data.plan).filter(r => {
    const d = parseDateLoose(r['날짜']);
    if (!d) return false;
    if (rangeFrom && d < rangeFrom) return false;
    if (rangeTo && d > rangeTo) return false;
    return true;
  });
  if (staffSel) rows = rows.filter(r => r['사원명'] === staffSel);
  rows = rows.filter(r => !isNaN(parseFloat(r['위도'])) && !isNaN(parseFloat(r['경도'])));
  // 날짜 → No 순으로 정렬 (날짜별 그룹 동선을 그리기 위함)
  rows.sort((a,b) => {
    const da = parseDateLoose(a['날짜']), db = parseDateLoose(b['날짜']);
    if (da && db && da.getTime() !== db.getTime()) return da - db;
    return (parseInt(a['No'])||0) - (parseInt(b['No'])||0);
  });

  clearIW();
  mgrMarkers.forEach(m => m.setMap(null)); mgrMarkers = [];
  mgrPolylines.forEach(p => p.setMap(null)); mgrPolylines = [];

  const list = document.getElementById('route-list');
  if (!rows.length) {
    list.innerHTML = `<div class="empty-hint">해당 기간에 등록된 영업계획이 없습니다.<br>(영업계획 시트는 실사용 전으로, 아직 데이터가 없을 수 있습니다.)</div>`;
    return;
  }

  // 날짜별 그룹핑 — 각 날짜의 방문 순서대로 선을 연결한다 (여러 날이면 날짜마다 다른 색)
  const byDate = {};
  rows.forEach(r => {
    const key = r['날짜'] || '미지정';
    (byDate[key] = byDate[key] || []).push(r);
  });
  const dateKeys = Object.keys(byDate).sort();
  const ROUTE_COLORS = ['#5c6ef8','#e67e22','#16a085','#c0392b','#8e44ad','#2980b9','#d35400','#27ae60'];

  const bounds = new kakao.maps.LatLngBounds();
  let listHtml = '';
  const flatPositions = []; // 리스트 클릭 시 이동용

  dateKeys.forEach((dateKey, di) => {
    const group = byDate[dateKey];
    const groupPath = [];
    const lineColor = ROUTE_COLORS[di % ROUTE_COLORS.length];

    if (dateKeys.length > 1) {
      listHtml += `<div style="padding:6px 12px;font-size:11px;font-weight:700;color:${lineColor}">${escHtml(dateKey)}</div>`;
    }

    group.forEach((r, gi) => {
      const lat = parseFloat(r['위도']), lng = parseFloat(r['경도']);
      const pos = new kakao.maps.LatLng(lat,lng);
      groupPath.push(pos);
      bounds.extend(pos);
      const flatIdx = flatPositions.length;
      flatPositions.push(pos);

      const visited = String(r['방문완료']).trim().toLowerCase() === 'true';
      const color = visited ? '#27ae60' : lineColor;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="11" fill="${color}" stroke="white" stroke-width="2"/><text x="12" y="16" font-size="11" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">${gi+1}</text></svg>`;
      const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      const marker = new kakao.maps.Marker({ position:pos, map:mgrMap, image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(24,24)) });
      kakao.maps.event.addListener(marker, 'click', () => {
        mgrMap.panTo(pos);
        if (curIW) curIW.setMap(null);
        curIW = new kakao.maps.CustomOverlay({
          position:pos, yAnchor:1.6,
          content:`<div class="iw"><div class="iw-name">${escHtml(r['거래처명'])}</div><div class="iw-addr">${escHtml(r['주소']||'')}</div><div class="iw-mgr">${visited?'방문완료':'미방문'} · ${escHtml(r['사원명'])} · ${escHtml(r['날짜']||'')}</div></div>`
        });
        curIW.setMap(mgrMap);
      });
      mgrMarkers.push(marker);
      listHtml += `<div class="route-item" data-idx="${flatIdx}">
        <div class="ri-name">${gi+1}. ${escHtml(r['거래처명'])} ${visited?'<span class="badge b-green">완료</span>':''}</div>
        <div class="ri-meta">${escHtml(r['사원명'])} · ${escHtml(r['날짜']||'')}</div>
      </div>`;
    });

    // 같은 날짜 안에서 방문 순서대로 선 연결 (점이 2개 이상일 때만)
    if (groupPath.length >= 2) {
      const polyline = new kakao.maps.Polyline({ path:groupPath, strokeWeight:3, strokeColor:lineColor, strokeOpacity:.8, strokeStyle:'solid' });
      polyline.setMap(mgrMap);
      mgrPolylines.push(polyline);
    }
  });

  list.innerHTML = listHtml;
  mgrMap.setBounds(bounds);

  list.querySelectorAll('.route-item').forEach(el => {
    el.onclick = () => {
      const idx = +el.dataset.idx;
      mgrMap.panTo(flatPositions[idx]);
    };
  });
}

// 동선지도 전용 기간 범위 계산 (사원별현황의 getStaffDateRange와 로직은 같지만 상태 변수가 독립적)
function getRoutePeriodRange() {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (routePeriod.mode === 'today') {
    return [todayStart, new Date(todayStart.getTime()+86400000-1)];
  }
  if (routePeriod.mode === '7d') {
    return [new Date(todayStart.getTime()-6*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  if (routePeriod.mode === '30d') {
    return [new Date(todayStart.getTime()-29*86400000), new Date(todayStart.getTime()+86400000-1)];
  }
  return [todayStart, new Date(todayStart.getTime()+86400000-1)];
}

// =====================================================
// 탭 전환
// =====================================================
document.getElementById('toptabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.ttab');
  if (!btn) return;
  document.querySelectorAll('.ttab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-' + btn.dataset.page).classList.add('on');

  const key = btn.dataset.page;
  if (!renderedTabs.has(key)) {
    // 최초 진입: 데이터가 이미 로드된 상태라면 여기서 렌더 (지도 컨테이너가 보이는 상태에서 생성됨)
    if (CUR_MGR) renderTab(key);
  } else {
    // 재방문: 지도가 있는 탭은 resize만 트리거 (컨테이너 크기가 display:none 동안 0으로 잡혔을 수 있음)
    if (key === 'route' && mgrMap) kakao.maps.event.trigger(mgrMap, 'resize');
    if (key === 'accounts' && acctMapInst) {
      // goToAccountsFiltered 등에서 acctFilter가 바뀌었을 수 있으므로 필터 상태 반영해 다시 그림
      updateAcctFilterButtons();
      renderAccountsTable();
      kakao.maps.event.trigger(acctMapInst, 'resize');
      renderAccountsMap();
    }
  }
});
